<!DOCTYPE html>
<html>
<head>
  <title>Login - Adoção de Cachorros</title>
</head>

<body style="background-color:#ffe6f0; font-family:Arial; margin:0;">

  <!-- Cabeçalho -->
  <div style="background-color:#ff99cc; padding:20px; text-align:center; color:white;">
    <h1>🐶 Adote um Amigo</h1>
    <p>Entre para iniciar o processo de adoção 💕</p>
  </div>

  <!-- Login -->
  <div style="text-align:center; margin-top:50px;">

    <h2 style="color:#ff4da6;">Login</h2>

    <form>
      <p>Email:</p>
      <input type="email" placeholder="Digite seu email" style="padding:8px; width:200px;"><br><br>

      <p>Senha:</p>
      <input type="password" placeholder="Digite sua senha" style="padding:8px; width:200px;"><br><br>

      <button style="background-color:#ff66a3; color:white; padding:10px 20px; border:none; border-radius:5px;">
        Entrar
      </button>
    </form>

    <p style="margin-top:20px;">Não tem conta? Cadastre-se</p>

  </div>

  <!-- Rodapé -->
  <div style="background-color:#ff99cc; padding:10px; text-align:center; color:white; margin-top:50px;">
    <p>Projeto acadêmico - Desenvolvimento Web</p>
  </div>

</body>
</html>
